<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - Continue Watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { transition: all 0.2s ease; }
        .navbar { background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.98) 100%); }
        .movie-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .movie-card:hover { transform: scale(1.08) translateY(-6px); }
        .nav-link:after {
            content: ''; position: absolute; width: 0; height: 3px; bottom: -2px; left: 0; background-color: #e50914;
        }
        .nav-link:hover:after { width: 100%; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- SHARED NAV -->
    <nav class="navbar fixed top-0 left-0 right-0 z-50 border-b border-white/10">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <div class="w-9 h-9 bg-[#e50914] rounded flex items-center justify-center text-white font-bold text-2xl">S</div>
                <h1 class="text-3xl font-bold tracking-tighter">StreamFlix</h1>
            </div>
            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a href="index.html" class="nav-link hover:text-[#e50914]"><i class="fas fa-home"></i> Home</a>
                <a href="browse.html" class="nav-link hover:text-[#e50914]"><i class="fas fa-compass"></i> Browse</a>
                <a href="movies.html" class="nav-link hover:text-[#e50914]"><i class="fas fa-film"></i> Movies</a>
                <a href="tv-shows.html" class="nav-link hover:text-[#e50914]"><i class="fas fa-tv"></i> TV Shows</a>
                <a href="continue-watching.html" class="nav-link text-[#e50914]"><i class="fas fa-history"></i> Continue Watching</a>
                <a href="my-list.html" class="nav-link hover:text-[#e50914]"><i class="fas fa-bookmark"></i> My List</a>
            </div>
            <div class="flex items-center gap-x-6">
                <i onclick="toggleSearch()" class="fas fa-search text-xl cursor-pointer"></i>
                <div onclick="showNotifications()" class="relative cursor-pointer"><i class="fas fa-bell text-xl"></i></div>
                <div onclick="toggleProfileMenu()" class="flex items-center cursor-pointer">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center text-sm font-bold">J</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-24 pb-16">
        <h1 class="text-4xl font-bold mb-10">Continue Watching</h1>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-6">
            <div onclick="viewMovie(7)" class="movie-card bg-zinc-900 rounded-2xl overflow-hidden cursor-pointer relative">
                <img src="https://picsum.photos/id/201/300/450" class="w-full aspect-[2/3] object-cover">
                <div class="absolute bottom-2 left-2 right-2 h-1 bg-zinc-700 rounded-full">
                    <div class="h-1 bg-[#e50914] rounded-full" style="width: 65%"></div>
                </div>
                <div class="p-4">
                    <div class="font-semibold">Deadpool & Wolverine</div>
                    <div class="text-xs text-zinc-400">65% watched • 2024</div>
                </div>
            </div>
            
            <div onclick="viewMovie(14)" class="movie-card bg-zinc-900 rounded-2xl overflow-hidden cursor-pointer relative">
                <img src="https://picsum.photos/id/380/300/450" class="w-full aspect-[2/3] object-cover">
                <div class="absolute bottom-2 left-2 right-2 h-1 bg-zinc-700 rounded-full">
                    <div class="h-1 bg-[#e50914] rounded-full" style="width: 42%"></div>
                </div>
                <div class="p-4">
                    <div class="font-semibold">Fallout</div>
                    <div class="text-xs text-zinc-400">42% watched • 2024</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function viewMovie(id) {
            window.location.href = `movie.html?id=${id}`;
        }
        function toggleSearch() { alert("Search"); }
        function showNotifications() { alert("Keep watching!"); }
        function toggleProfileMenu() { alert("Premium Account"); }
    </script>
</body>
</html>
